<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenAlgo Charts — yfinance historical demo</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0d0e12; color: #c7ccd8; font: 13px/1.4 system-ui, sans-serif; }
    .bar { padding: 8px 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input, select, button { background: #1c2030; color: #c7ccd8; border: 1px solid #2a3046; border-radius: 6px; padding: 4px 8px; }
    input[type="text"] { width: 90px; }
    input[type="number"] { width: 50px; }
    input[type="checkbox"] { width: auto; }
    label.chk { display: inline-flex; gap: 4px; align-items: center; user-select: none; opacity: .85; }
    button { cursor: pointer; }
    .sep { width: 1px; align-self: stretch; background: #2a3046; margin: 0 2px; }
    #buy { border-color: #2c6e64; color: #7fd8cd; }
    #sell { border-color: #7a3633; color: #f3a3a1; }
    #chart { position: absolute; top: 46px; left: 0; right: 0; bottom: 0; cursor: crosshair; }
    #status { margin-left: auto; opacity: .75; }
    /* OHLC legend overlay — sits on top of the plot, never intercepts the crosshair */
    #legend {
      position: absolute; top: 54px; left: 16px; z-index: 10; pointer-events: none;
      font: 12px/1.4 system-ui, sans-serif; white-space: nowrap; text-shadow: 0 0 3px #0d0e12;
    }
    #legend .name { color: #e8eaf0; font-weight: 600; }
    #legend .meta { opacity: .5; }
    #legend .lbl { opacity: .55; margin-left: 8px; }

    /* Sahi-style bracket panel: pills glued to the entry/TP/SL prices, draggable */
    #bracket { position: fixed; inset: 0; z-index: 20; pointer-events: none; }
    #bracket .bk {
      position: absolute; left: 16px; transform: translateY(-50%); display: inline-flex; align-items: center;
      gap: 10px; font: 11px/1 system-ui, sans-serif; padding: 5px 9px; border-radius: 7px; white-space: nowrap;
      pointer-events: auto; box-shadow: 0 2px 8px rgba(0,0,0,.45); user-select: none;
    }
    #bracket .bk b { color: #fff; font-weight: 600; }
    #bracket .bk.tp { background: #0e9c84; color: #d7f5ee; cursor: ns-resize; }
    #bracket .bk.sl { background: #c0414c; color: #fadadd; cursor: ns-resize; }
    #bracket .bk.entry { background: #161b2b; border: 1px solid #2c3349; color: #aeb6c8; cursor: move; }
    #bracket .bk .pnl { font-weight: 700; color: #fff; }
    #bracket .bk button {
      font: 11px/1 system-ui; border-radius: 5px; padding: 4px 9px; cursor: pointer; border: 1px solid transparent; color: #fff;
    }
    #bracket .bk .bk-x { background: transparent; color: #9aa3b2; border-color: #2c3349; padding: 3px 8px; }
    #bracket .bk .bk-buy { background: #1f9e88; }
    #bracket .bk .bk-sell { background: #d6485a; }
    #bracket .bk .bk-mod { background: #2c3349; color: #c7ccd8; }
    .hint { opacity: .4; font-size: 11px; }

    /* NinjaTrader-style right-click order menu */
    #ctxmenu {
      position: fixed; z-index: 30; min-width: 168px; background: #11151f; border: 1px solid #2a3046;
      border-radius: 8px; padding: 4px; box-shadow: 0 6px 20px rgba(0,0,0,.5); font: 12px system-ui, sans-serif;
    }
    #ctxmenu button {
      display: block; width: 100%; text-align: left; background: transparent; border: 0; border-radius: 5px;
      color: #c7ccd8; padding: 6px 10px; cursor: pointer;
    }
    #ctxmenu button:hover { background: #1d2333; }
    #ctxmenu button.buy:hover { background: #163e38; color: #7fd8cd; }
    #ctxmenu button.sell:hover { background: #3e1f22; color: #f3a3a1; }
    #ctxmenu hr { border: 0; border-top: 1px solid #232a3d; margin: 4px 6px; }
  </style>
</head>
<body>
  <div class="bar">
    <strong>yfinance</strong>
    <input type="text" id="symbol" value="AAPL" title="Yahoo Finance symbol (AAPL, MSFT, RELIANCE.NS, ^NSEI, BTC-USD)" />
    <select id="interval" title="bar interval">
      <option>1d</option><option>1h</option><option>30m</option><option>15m</option><option>5m</option><option>1wk</option>
    </select>
    <select id="period" title="history range">
      <option>1mo</option><option selected>1y</option><option>6mo</option><option>5y</option><option>max</option>
    </select>
    <select id="ctype" title="chart type">
      <option value="candlestick">Candles</option>
      <option value="hollow-candle">Hollow Candles</option>
      <option value="bar">Bars (OHLC)</option>
      <option value="high-low">High-Low</option>
      <option value="volume-candle">Volume Candles</option>
      <option value="line">Line</option>
      <option value="line-markers">Line + Markers</option>
      <option value="step">Step Line</option>
      <option value="area">Area</option>
      <option value="hlc-area">HLC Area</option>
      <option value="baseline">Baseline</option>
    </select>
    <label class="chk"><input type="checkbox" id="st" checked /> Supertrend</label>
    <label class="chk"><input type="checkbox" id="rsi" checked /> RSI</label>
    <label class="chk"><input type="checkbox" id="vgrid" checked /> V Grid</label>
    <label class="chk"><input type="checkbox" id="hgrid" checked /> H Grid</label>
    <button id="load">Load</button>
    <button id="save" title="Save the full chart as a PNG (right-click only captures the overlay)">Save PNG</button>
    <button id="fit" title="restore the default view (fit bars + auto price scale) — same as double-click">Fit</button>
    <span class="sep"></span>
    <input type="number" id="qty" value="100" min="1" title="order quantity" />
    <select id="product" title="product (OpenAlgo order constant)">
      <option value="MIS">MIS</option><option value="CNC">CNC</option><option value="NRML">NRML</option>
    </select>
    <button id="buy" title="Place a Buy OCO bracket: entry + target + stop (target and stop are OCO)">Buy Bracket</button>
    <button id="sell" title="Place a Sell OCO bracket: entry + target + stop (target and stop are OCO)">Sell Bracket</button>
    <button id="cancel" title="Cancel the bracket + all orders">Cancel</button>
    <span class="hint">bracket = entry + OCO target/stop · right-click the chart for single orders</span>
    <span id="status"></span>
  </div>
  <div id="chart"></div>
  <div id="legend"></div>

  <!-- Sahi-style bracket panel (positions tracked to price every frame) -->
  <div id="bracket" hidden>
    <div class="bk tp" id="bk-tp">
      <span>TP: <b class="pts">0</b> Pts (<span class="pct">0%</span>)</span>
      <span class="pnl">+0</span>
    </div>
    <div class="bk entry" id="bk-entry">
      <button class="bk-x" data-act="cancel" title="Cancel bracket">x</button>
      <span>Qty: <b class="q">0</b></span>
      <span>Risk/Reward: <b class="rr">0</b></span>
      <button class="bk-buy" data-act="place">1-Click</button>
      <button class="bk-mod" data-act="modify">Modify</button>
    </div>
    <div class="bk sl" id="bk-sl">
      <span>SL: <b class="pts">0</b> Pts (<span class="pct">0%</span>)</span>
      <span class="pnl">-0</span>
    </div>
  </div>

  <!-- NinjaTrader-style right-click order menu (price under the cursor) -->
  <div id="ctxmenu" hidden>
    <button class="buy" data-side="BUY" data-type="MARKET">Buy Market</button>
    <button class="sell" data-side="SELL" data-type="MARKET">Sell Market</button>
    <hr>
    <button class="buy" data-side="BUY" data-type="LIMIT">Buy Limit</button>
    <button class="sell" data-side="SELL" data-type="LIMIT">Sell Limit</button>
    <hr>
    <button class="buy" data-side="BUY" data-type="SL">Buy Stop (SL)</button>
    <button class="sell" data-side="SELL" data-type="SL">Sell Stop (SL)</button>
    <hr>
    <button data-act="cancelall">Cancel All Orders</button>
  </div>

  <script type="module">
    import { createChart, rsiSeries, supertrendSeries, LogoWatermark } from '/dist/openalgo-charts.mjs';

    // A broker-agnostic DataFeed for yfinance: getBars hits this demo's /api/history,
    // which already returns the chart's Bar shape (time in UTC seconds).
    class YFinanceDataFeed {
      async getBars(req) {
        const url = `/api/history?symbol=${encodeURIComponent(req.symbol)}&interval=${req.interval}&period=${req.period}`;
        const res = await fetch(url);
        const json = await res.json();
        if (!res.ok || json.error) throw new Error(json.error || `history failed (${res.status})`);
        return json; // already Bar[]
      }
    }

    const feed = new YFinanceDataFeed();
    const UP = '#26a69a', DOWN = '#ef5350';
    const TRADE_EXTENT = 0.30; // order/bracket lines span only the rightmost 30% (NinjaTrader-style)
    let chart, price, volume;

    // Resting orders placed by right-click: each is one draggable price line.
    let orders = [];   // { id, side, type, price, qty, product, line }
    let nextOrderId = 1;
    // Market fills build a net position (avg price) shown as a solid line + arrow markers.
    let position = null;   // { netQty, avgPrice }
    let posLine = null;    // PriceLine for the position
    let fills = [];        // marker list for executed market orders
    let markersApi = null; // SeriesMarkers handle on the price series

    // Persist trade state per symbol so orders/bracket/position survive a refresh.
    const STORE_KEY = (sym) => 'oa-charts-trade:' + sym;
    function saveState() {
      if (!req.symbol) return;
      try {
        localStorage.setItem(STORE_KEY(req.symbol), JSON.stringify({
          orders: orders.map((o) => ({ id: o.id, side: o.side, type: o.type, price: o.price, qty: o.qty, product: o.product })),
          nextOrderId, bracket, position, fills,
        }));
      } catch (_) {}
    }
    function restoreState(sym) {
      let s = null;
      try { s = JSON.parse(localStorage.getItem(STORE_KEY(sym)) || 'null'); } catch (_) {}
      orders = s && s.orders ? s.orders.map((o) => ({ ...o, line: null })) : [];
      nextOrderId = s && s.nextOrderId ? s.nextOrderId : 1;
      bracket = s ? s.bracket || null : null;
      position = s ? s.position || null : null;
      fills = s && s.fills ? s.fills : [];
    }
    let currentBars = [];          // cached so a chart-type switch needs no refetch
    const idxByTime = new Map();   // bar time -> array index (for previous-close lookup)
    let req = {};                  // last-loaded request (symbol/interval/period)

    const el = (id) => document.getElementById(id);
    const fmt = (n) => Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const round2 = (n) => Math.round(n * 100) / 100;
    function fmtVol(v) {
      if (v == null) return '';
      const a = Math.abs(v);
      if (a >= 1e9) return (v / 1e9).toFixed(2) + 'B';
      if (a >= 1e6) return (v / 1e6).toFixed(2) + 'M';
      if (a >= 1e3) return (v / 1e3).toFixed(2) + 'K';
      return String(v);
    }
    function exchangeOf(sym) {
      const s = sym.toUpperCase();
      if (s.endsWith('.NS')) return 'NSE';
      if (s.endsWith('.BO')) return 'BSE';
      if (s.startsWith('^')) return 'INDEX';
      if (s.endsWith('-USD')) return 'CRYPTO';
      return 'yfinance';
    }
    const nameOf = (sym) => sym.toUpperCase().replace(/\.(NS|BO)$/, '');

    // Title + O H L C V + change(%). Driven by the crosshair; falls back to the last bar.
    function setLegend(bar) {
      const legend = el('legend');
      const head = `<span class="name">${nameOf(req.symbol || '')}</span>`
        + `<span class="meta"> &middot; ${(req.interval || '').toUpperCase()} &middot; ${exchangeOf(req.symbol || '')}</span>`;
      if (!bar) { legend.innerHTML = head; return; }
      const i = idxByTime.get(bar.time);
      const prevClose = (i != null && i > 0) ? currentBars[i - 1].close : bar.open;
      const chg = bar.close - prevClose;
      const pct = prevClose ? (chg / prevClose) * 100 : 0;
      const col = bar.close >= bar.open ? UP : DOWN;
      const chgCol = chg >= 0 ? UP : DOWN;
      const v = (label, val) => `<span class="lbl">${label}</span><span style="color:${col}">${fmt(val)}</span>`;
      const vol = bar.volume != null ? `<span class="lbl">V</span><span style="color:${col}">${fmtVol(bar.volume)}</span>` : '';
      const sign = chg >= 0 ? '+' : '';
      const change = `<span style="color:${chgCol};margin-left:10px">${sign}${fmt(chg)} (${sign}${pct.toFixed(2)}%)</span>`;
      legend.innerHTML = head + v('O', bar.open) + v('H', bar.high) + v('L', bar.low) + v('C', bar.close) + ' ' + vol + change;
    }

    // ── Sahi-style bracket (entry / target / stop) ──────────────────────────
    let bracket = null;   // { side, entry, target, stop, qty }
    let bLines = null;    // { entry, tp, sl } price-line primitives on the current chart
    const rupee = (n) => (n < 0 ? '-' : '+') + '₹' + Math.round(Math.abs(n)).toLocaleString('en-IN');
    const chartTop = () => el('chart').getBoundingClientRect().top;

    function makeBracket(side) {
      if (!currentBars.length) return;
      const entry = round2(currentBars[currentBars.length - 1].close);
      const qty = Math.max(1, Number(el('qty').value) || 1);
      bracket = {
        side, entry, qty,
        target: round2(side === 'BUY' ? entry * 1.012 : entry * 0.988),
        stop: round2(side === 'BUY' ? entry * 0.99 : entry * 1.01),
      };
      attachBracketLines();
      el('bracket').hidden = false;
      el('bk-entry').querySelector('[data-act="place"]').className = side === 'BUY' ? 'bk-buy' : 'bk-sell';
      updateBracket();
      saveState();
    }

    // (Re)create the three dashed price lines on the current chart. They auto-sync
    // with pan/zoom and are draggable through the chart's subscribeDrag.
    function attachBracketLines() {
      if (!bracket) return;
      const pl = (price, color, id) => chart.addPriceLine(
        { price, color, lineWidth: 1, dashed: true, id, cursor: 'ns-resize', extentFromRight: TRADE_EXTENT }, 0);
      bLines = {
        entry: pl(bracket.entry, '#8a93a7', 'bk-entry'),
        tp: pl(bracket.target, UP, 'bk-tp'),
        sl: pl(bracket.stop, DOWN, 'bk-sl'),
      };
    }

    // Move one leg (or the whole bracket via the entry) and keep TP/SL on the
    // correct side of entry, then refresh lines, labels and pill positions.
    function setBracketPrice(which, raw) {
      if (!bracket) return;
      const p = round2(raw);
      const buy = bracket.side === 'BUY';
      if (which === 'entry') {
        const d = p - bracket.entry;
        bracket.entry = p; bracket.target = round2(bracket.target + d); bracket.stop = round2(bracket.stop + d);
      } else if (which === 'tp') {
        bracket.target = buy ? Math.max(p, bracket.entry + 0.01) : Math.min(p, bracket.entry - 0.01);
      } else {
        bracket.stop = buy ? Math.min(p, bracket.entry - 0.01) : Math.max(p, bracket.entry + 0.01);
      }
      updateBracket();
      saveState();
    }

    function updateBracket() {
      if (!bracket || !bLines) return;
      bLines.entry.setPrice(bracket.entry); bLines.tp.setPrice(bracket.target); bLines.sl.setPrice(bracket.stop);
      const sign = bracket.side === 'BUY' ? 1 : -1;
      const tpPts = Math.abs(bracket.target - bracket.entry);
      const slPts = Math.abs(bracket.entry - bracket.stop);
      const tpPnl = sign * (bracket.target - bracket.entry) * bracket.qty;
      const slPnl = sign * (bracket.stop - bracket.entry) * bracket.qty;
      const rr = slPts > 0 ? tpPts / slPts : 0;
      const set = (id, pts, pnl) => {
        const n = el(id);
        n.querySelector('.pts').textContent = fmt(pts);
        n.querySelector('.pct').textContent = (pts / bracket.entry * 100).toFixed(2) + '%';
        n.querySelector('.pnl').textContent = rupee(pnl);
      };
      set('bk-tp', tpPts, tpPnl);
      set('bk-sl', slPts, slPnl);
      const e = el('bk-entry');
      e.querySelector('.q').textContent = bracket.qty;
      e.querySelector('.rr').textContent = rr.toFixed(2);
      e.querySelector('[data-act="place"]').textContent = '1-Click ' + (bracket.side === 'BUY' ? 'Buy' : 'Sell');
      positionPills();
    }

    // Glue each pill to its price and to the LEFT end of the 30% line (viewport
    // coords), clamped to stay on the chart and off the price axis.
    function positionPills() {
      if (!bracket || el('bracket').hidden) return;
      const rect = el('chart').getBoundingClientRect();
      const plotW = Math.max(0, rect.width - 72); // priceAxisWidth
      const lineLeftX = rect.left + plotW * (1 - TRADE_EXTENT);
      const at = { 'bk-tp': bracket.target, 'bk-entry': bracket.entry, 'bk-sl': bracket.stop };
      for (const id in at) {
        const y = chart ? chart.priceToCoordinate(at[id], 0) : null;
        const node = el(id);
        if (y == null) { node.style.display = 'none'; continue; }
        node.style.display = '';
        node.style.top = (rect.top + y) + 'px';
        node.style.left = Math.max(rect.left + 8, Math.min(lineLeftX, rect.right - node.offsetWidth - 84)) + 'px';
      }
    }
    function removeBracket() {
      if (bLines && chart) for (const k in bLines) chart.removePrimitive(bLines[k]);
      bracket = null; bLines = null; el('bracket').hidden = true;
    }

    // ── Resting orders (right-click) — each a draggable NinjaTrader-style line ──
    function orderLine(o) {
      return chart.addPriceLine({
        price: o.price, color: o.side === 'BUY' ? UP : DOWN, lineWidth: 1, dashed: true,
        id: `order:${o.id}`, cursor: 'ns-resize', extentFromRight: TRADE_EXTENT,
        leftLabel: `${o.side} ${o.qty} ${o.type}`, closeButton: true, // click the box to cancel
      }, 0);
    }
    function cancelOrder(id) { // id = "order:<n>"
      const o = orders.find((x) => `order:${x.id}` === id);
      if (!o) return;
      if (o.line && chart) chart.removePrimitive(o.line);
      orders = orders.filter((x) => x !== o);
      el('status').textContent = `cancelled ${o.side} ${o.type} @ ${fmt(o.price)}`;
      saveState();
    }
    function placeOrder(side, type, price) {
      const qty = Math.max(1, Number(el('qty').value) || 1);
      if (type === 'MARKET') { fillMarket(side, qty); return; } // executes into a position
      const o = { id: nextOrderId++, side, type, price: round2(price), qty, product: el('product').value };
      o.line = chart ? orderLine(o) : null;
      orders.push(o);
      el('status').textContent = `${side} ${type} ${qty} ${req.symbol} @ ${fmt(o.price)} (${o.product}) — drag the line to modify`;
      saveState();
    }
    function attachOrderLines() { for (const o of orders) o.line = orderLine(o); } // on chart rebuild
    function removeAllOrders() {
      if (chart) for (const o of orders) if (o.line) chart.removePrimitive(o.line);
      orders = [];
    }

    // Execute a market order at the last price → update the net position, drop an
    // arrow marker on the bar, and (re)draw the position line.
    function fillMarket(side, qty) {
      if (!currentBars.length) return;
      const last = currentBars[currentBars.length - 1];
      const price = round2(last.close);
      const signed = side === 'BUY' ? qty : -qty;
      if (!position || position.netQty === 0) {
        position = { netQty: signed, avgPrice: price };
      } else if (Math.sign(position.netQty) === Math.sign(signed)) {
        const net = position.netQty + signed; // adding → volume-weighted average
        position.avgPrice = (position.avgPrice * position.netQty + price * signed) / net;
        position.netQty = net;
      } else {
        const net = position.netQty + signed; // reducing / flipping
        position = net === 0 ? null
          : Math.sign(net) === Math.sign(position.netQty) ? { netQty: net, avgPrice: position.avgPrice }
          : { netQty: net, avgPrice: price };
      }
      fills.push({
        time: last.time, position: side === 'BUY' ? 'belowBar' : 'aboveBar',
        shape: side === 'BUY' ? 'arrowUp' : 'arrowDown', size: 'small',
        color: side === 'BUY' ? UP : DOWN, text: `${side[0]} ${qty}`,
      });
      if (markersApi) markersApi.setMarkers(fills);
      updatePositionLine();
      const p = position;
      el('status').textContent = p
        ? `${side} MARKET ${qty} filled @ ${fmt(price)} → ${p.netQty > 0 ? 'LONG' : 'SHORT'} ${Math.abs(p.netQty)} @ ${fmt(p.avgPrice)}`
        : `${side} MARKET ${qty} filled @ ${fmt(price)} → flat`;
      saveState();
    }
    // P&L of the open position marked at `mp` (defaults to the latest close).
    function markPrice() { return currentBars.length ? currentBars[currentBars.length - 1].close : 0; }
    function positionLabel(mp) {
      const long = position.netQty > 0;
      const pnl = (mp - position.avgPrice) * position.netQty;
      return `${long ? 'LONG' : 'SHORT'} ${Math.abs(position.netQty)} @ ${fmt(position.avgPrice)}  ${rupee(pnl)}`;
    }
    function updatePositionLine() {
      if (posLine && chart) { chart.removePrimitive(posLine); posLine = null; }
      if (!position || position.netQty === 0 || !chart) return;
      const long = position.netQty > 0;
      posLine = chart.addPriceLine({
        price: round2(position.avgPrice), color: long ? '#2e7d6b' : '#a14a52', lineWidth: 2, dashed: false,
        id: 'position', extentFromRight: TRADE_EXTENT, leftLabel: positionLabel(markPrice()), closeButton: true,
      }, 0);
    }
    function clearPosition() {
      if (posLine && chart) chart.removePrimitive(posLine);
      posLine = null; position = null; fills = [];
      if (markersApi) markersApi.setMarkers([]);
    }
    // Keep pills locked to price across pan / zoom / rescale / kinetic.
    (function frame() { positionPills(); requestAnimationFrame(frame); })();

    // Drag a pill vertically to modify its leg (entry pill moves the whole bracket).
    function dragify(id, which) {
      const node = el(id);
      node.addEventListener('pointerdown', (e) => {
        if (e.target.closest('button')) return; // let buttons handle their own clicks
        node.setPointerCapture(e.pointerId); node._drag = true; e.preventDefault();
      });
      node.addEventListener('pointermove', (e) => {
        if (!node._drag) return;
        const p = chart && chart.coordinateToPrice(e.clientY - chartTop(), 0);
        if (p != null) setBracketPrice(which, p);
      });
      const end = (e) => { node._drag = false; try { node.releasePointerCapture(e.pointerId); } catch (_) {} };
      node.addEventListener('pointerup', end);
      node.addEventListener('pointercancel', end);
    }
    dragify('bk-tp', 'tp'); dragify('bk-entry', 'entry'); dragify('bk-sl', 'sl');

    el('bracket').addEventListener('click', (e) => {
      const act = e.target.getAttribute && e.target.getAttribute('data-act');
      if (!act || !bracket) return;
      if (act === 'cancel') { removeBracket(); saveState(); el('status').textContent = 'bracket cancelled'; }
      else if (act === 'place') {
        el('status').textContent = `placed ${bracket.side} OCO bracket — ${bracket.qty} entry ${fmt(bracket.entry)} · TP ${fmt(bracket.target)} · SL ${fmt(bracket.stop)} (target/stop are OCO)`;
      } else if (act === 'modify') {
        const rr = (Math.abs(bracket.target - bracket.entry) / Math.max(1e-9, Math.abs(bracket.entry - bracket.stop))).toFixed(2);
        el('status').textContent = `bracket — entry ${fmt(bracket.entry)} · TP ${fmt(bracket.target)} · SL ${fmt(bracket.stop)} · R:R ${rr}`;
      }
    });

    // (Re)build the chart for the currently selected type using cached bars.
    function render() {
      if (chart) chart.destroy();
      el('chart').innerHTML = '';
      chart = createChart(el('chart'), {
        priceAxisWidth: 72, // free crosshair (follows pointer)
        grid: { vertLines: el('vgrid').checked, horzLines: el('hgrid').checked },
      });
      // OpenAlgo brand watermark (on-canvas, captured by screenshots).
      chart.addPrimitive(new LogoWatermark({ src: '/examples/openalgo-logo.svg', height: 30, opacity: 0.9, position: 'bottom-left' }));

      const type = el('ctype').value;
      const style = {};
      if (type === 'baseline') {
        const avg = currentBars.reduce((s, b) => s + b.close, 0) / (currentBars.length || 1);
        style.baseValue = avg;
      }
      price = chart.addSeries(type, { style }); // first series → drives the OHLC legend
      volume = chart.addSeries('histogram', { paneIndex: 1, style: { color: '#33415e' } });
      price.setData(currentBars);
      volume.setData(currentBars.map((b) => ({ time: b.time, open: 0, high: b.volume, low: 0, close: b.volume })));
      markersApi = price.createMarkers(); // executed-fill arrows
      markersApi.setMarkers(fills);

      // Supertrend(10, 3) overlay — green uptrend / red downtrend (openalgo.ta.supertrend).
      if (el('st').checked) {
        const { up, down } = supertrendSeries(currentBars, 10, 3);
        chart.addSeries('line', { style: { color: UP, lineWidth: 2 } }).setData(up);
        chart.addSeries('line', { style: { color: DOWN, lineWidth: 2 } }).setData(down);
      }

      // RSI(14) in its own bottom pane with 70/30 guides + 50 midline (openalgo.ta.rsi).
      if (el('rsi').checked) {
        const rsiPane = 2;
        chart.addSeries('line', { paneIndex: rsiPane, style: { color: '#e0b020', lineWidth: 1.5 } })
          .setData(rsiSeries(currentBars, 14));
        chart.addPriceLine({ price: 70, color: DOWN, lineWidth: 1, dashed: true, id: 'rsi-70', label: '70' }, rsiPane);
        chart.addPriceLine({ price: 30, color: UP, lineWidth: 1, dashed: true, id: 'rsi-30', label: '30' }, rsiPane);
        chart.addPriceLine({ price: 50, color: '#5a6072', lineWidth: 1, dashed: true, id: 'rsi-50', label: '50' }, rsiPane);
      }

      // Chart trading: one drag handler routes both — drag a bracket leg → move
      // that leg; drag a resting order line → re-price that order. Both are redrawn
      // on the freshly-rebuilt chart.
      chart.subscribeDrag((externalId, p) => {
        if (externalId.startsWith('bk-')) { setBracketPrice(externalId.slice(3), p); return; }
        if (externalId.startsWith('order:')) {
          const o = orders.find((x) => `order:${x.id}` === externalId);
          if (o && o.line) { o.price = round2(p); o.line.setPrice(o.price); el('status').textContent = `${o.side} ${o.type} order -> ${fmt(o.price)}`; saveState(); }
        }
      });
      // Click the cancel box on a line: cancel that order, or close the position.
      chart.subscribeClick((id) => {
        if (id === 'position::close') { clearPosition(); saveState(); el('status').textContent = 'position closed'; return; }
        if (id.endsWith('::close')) cancelOrder(id.slice(0, -'::close'.length));
      });
      attachOrderLines();
      updatePositionLine(); // redraw the position line on the rebuilt chart
      if (bracket) {
        el('bracket').hidden = false;
        el('bk-entry').querySelector('[data-act="place"]').className = bracket.side === 'BUY' ? 'bk-buy' : 'bk-sell';
        attachBracketLines(); updateBracket();
      }

      // OHLC legend tracks the crosshair. The position P&L does NOT — it marks to
      // the LTP (the latest close here; with a live feed, update it on each tick).
      chart.subscribeCrosshairMove((e) => setLegend(e.bar ?? currentBars[currentBars.length - 1]));
      setLegend(currentBars[currentBars.length - 1]);
      window.__chart = () => chart;
    }

    async function load() {
      const status = el('status');
      req = { symbol: el('symbol').value.trim(), interval: el('interval').value, period: el('period').value };
      status.textContent = `loading ${req.symbol} ${req.interval}...`;
      try {
        const bars = await feed.getBars(req);
        currentBars = bars;
        idxByTime.clear();
        bars.forEach((b, i) => idxByTime.set(b.time, i));
        removeBracket(); removeAllOrders(); clearPosition(); // detach old chart's lines + reset vars
        restoreState(req.symbol);                            // repopulate this symbol's saved orders/bracket/position
        render();
        status.textContent = `${req.symbol} · ${bars.length} bars · ${req.interval}/${req.period}`;
      } catch (e) {
        status.textContent = 'error: ' + e.message;
      }
    }

    el('buy').addEventListener('click', () => makeBracket('BUY'));
    el('sell').addEventListener('click', () => makeBracket('SELL'));
    el('cancel').addEventListener('click', () => { removeBracket(); removeAllOrders(); clearPosition(); saveState(); el('status').textContent = 'cancelled / flat'; });
    el('qty').addEventListener('change', () => { if (bracket) { bracket.qty = Math.max(1, Number(el('qty').value) || 1); updateBracket(); saveState(); } });

    // ── NinjaTrader-style right-click order entry ───────────────────────────
    // Right-click the chart to open a menu and place an order at the cursor price.
    // LIMIT/SL orders appear as draggable working-order lines; MARKET fills now.
    const ctxMenu = el('ctxmenu');
    let ctxPrice = 0;
    const hideCtx = () => { ctxMenu.hidden = true; };
    el('chart').addEventListener('contextmenu', (e) => {
      const p = chart && currentBars.length ? chart.coordinateToPrice(e.clientY - chartTop(), 0) : null;
      if (p == null) return;
      e.preventDefault();
      ctxPrice = round2(p);
      ctxMenu.querySelectorAll('button[data-type]').forEach((b) => {
        const verb = b.getAttribute('data-side') === 'BUY' ? 'Buy' : 'Sell';
        const type = b.getAttribute('data-type');
        b.textContent = type === 'MARKET' ? `${verb} Market`
          : type === 'LIMIT' ? `${verb} Limit @ ${fmt(ctxPrice)}`
          : `${verb} Stop (SL) @ ${fmt(ctxPrice)}`;
      });
      ctxMenu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
      ctxMenu.style.top = Math.min(e.clientY, window.innerHeight - 230) + 'px';
      ctxMenu.hidden = false;
    });
    window.addEventListener('click', hideCtx);
    window.addEventListener('blur', hideCtx);
    el('chart').addEventListener('wheel', hideCtx, { passive: true });
    ctxMenu.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      e.stopPropagation();
      hideCtx();
      if (btn.getAttribute('data-act') === 'cancelall') {
        removeAllOrders(); removeBracket(); clearPosition(); saveState(); el('status').textContent = 'all orders cancelled / flat'; return;
      }
      placeOrder(btn.getAttribute('data-side'), btn.getAttribute('data-type'), ctxPrice);
    });

    el('load').addEventListener('click', load);
    el('fit').addEventListener('click', () => { if (chart) chart.resetScale(); });
    el('symbol').addEventListener('keydown', (e) => { if (e.key === 'Enter') load(); });
    // Export the full chart (all layers composited) — native right-click "Save image"
    // only grabs the canvas under the pointer (the transparent crosshair overlay).
    el('save').addEventListener('click', () => {
      if (!chart) return;
      const a = document.createElement('a');
      a.download = `${nameOf(req.symbol || 'chart')}_${(req.interval || '').toLowerCase()}.png`;
      a.href = chart.takeScreenshot().toDataURL('image/png');
      a.click();
    });
    // switching chart type / toggling indicators re-renders cached bars (no network round-trip)
    ['ctype', 'st', 'rsi'].forEach((id) => el(id).addEventListener('change', () => { if (currentBars.length) render(); }));
    // toggle grid lines live (no rebuild needed)
    const applyGrid = () => chart && chart.setGridOptions({ vertLines: el('vgrid').checked, horzLines: el('hgrid').checked });
    el('vgrid').addEventListener('change', applyGrid);
    el('hgrid').addEventListener('change', applyGrid);
    load();
  </script>
</body>
</html>
