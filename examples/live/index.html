<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenAlgo Charts — LIVE (history + WebSocket)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0d0e12; color: #c7ccd8; font: 13px/1.4 system-ui, sans-serif; }
    .bar { padding: 8px 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input, select, button { background: #1c2030; color: #c7ccd8; border: 1px solid #2a3046; border-radius: 6px; padding: 4px 8px; }
    input[type="text"] { width: 110px; } #apikey { width: 230px; } #wsurl { width: 170px; }
    button { cursor: pointer; }
    #connect { border-color: #2c6e64; color: #7fd8cd; }
    #chart { position: absolute; top: 84px; left: 0; right: 0; bottom: 0; cursor: crosshair; }
    #status { margin-left: auto; opacity: .8; }
    .row2 { padding: 0 12px 8px; opacity: .85; }
    .legend { position: absolute; top: 92px; left: 16px; z-index: 10; pointer-events: none; font: 12px system-ui; text-shadow: 0 0 3px #0d0e12; }
    .legend b { color: #e8eaf0; } .up { color: #26a69a; } .dn { color: #ef5350; } .ltp { color: #e0b020; }
    .pill { padding: 1px 6px; border: 1px solid #2a3046; border-radius: 5px; opacity: .85; }
    label.chk { display: inline-flex; gap: 4px; align-items: center; user-select: none; }
    input[type="checkbox"] { width: auto; }
    #mode { font-weight: 600; }
    #mode.analyze { color: #7fd8cd; } #mode.live { color: #ff8a8a; }
    #buy { border-color: #2c6e64; color: #7fd8cd; } #sell { border-color: #7a3633; color: #f3a3a1; }
    /* NinjaTrader-style right-click order menu */
    #ctxmenu { position: fixed; z-index: 30; min-width: 190px; background: #11151f; border: 1px solid #2a3046;
      border-radius: 8px; padding: 4px; box-shadow: 0 6px 20px rgba(0,0,0,.5); font: 12px system-ui; }
    #ctxmenu button { display: block; width: 100%; text-align: left; background: transparent; border: 0; border-radius: 5px;
      color: #c7ccd8; padding: 6px 10px; cursor: pointer; }
    #ctxmenu button:hover { background: #1d2333; }
    #ctxmenu button.buy:hover { background: #163e38; color: #7fd8cd; }
    #ctxmenu button.sell:hover { background: #3e1f22; color: #f3a3a1; }
    #ctxmenu hr { border: 0; border-top: 1px solid #232a3d; margin: 4px 6px; }
  </style>
</head>
<body>
  <div class="bar">
    <strong>OpenAlgo LIVE</strong>
    <input type="text" id="apikey" placeholder="OpenAlgo API key" title="saved to this browser only (localStorage); never committed" />
    <input type="text" id="symbol" value="RELIANCE" />
    <select id="exchange" title="exchange (OpenAlgo constant)">
      <option>NSE</option><option>NFO</option><option>BSE</option><option>BFO</option><option>MCX</option><option>NSE_INDEX</option>
    </select>
    <select id="interval" title="bar interval">
      <option value="1m">1m</option><option value="5m" selected>5m</option><option value="15m">15m</option><option value="1h">1h</option><option value="D">D</option>
    </select>
    <button id="connect">Connect</button>
    <button id="disconnect">Disconnect</button>
    <button id="fit" title="restore the default view (fit bars + auto price scale) — same as double-click">Fit</button>
    <span id="status">enter your API key and Connect</span>
  </div>
  <div class="row2">
    <span class="pill">REST <code>/api/v1/history</code> via local proxy</span>
    <input type="text" id="wsurl" value="ws://127.0.0.1:8765" title="OpenAlgo WebSocket proxy" />
    <span class="pill" id="wsstate">WS idle</span>
    <span class="pill" id="ticks">0 ticks</span>
    <span class="pill" id="ltp">LTP —</span>
    <span class="sep" style="display:inline-block;width:12px"></span>
    <input type="number" id="qty" value="1" min="1" style="width:54px" title="order quantity" />
    <select id="product" title="product"><option>MIS</option><option>CNC</option><option>NRML</option></select>
    <label class="chk"><input type="checkbox" id="arm" /> Arm trading</label>
    <span class="pill" id="mode" title="OpenAlgo order routing mode">mode —</span>
    <span class="pill" style="opacity:.5">right-click chart to order</span>
  </div>
  <div id="chart"></div>
  <div class="legend" id="legend"></div>

  <!-- right-click order menu (price under the cursor) -->
  <div id="ctxmenu" hidden>
    <button class="buy" data-side="BUY" data-type="MARKET">Buy Market</button>
    <button class="sell" data-side="SELL" data-type="MARKET">Sell Market</button>
    <hr>
    <button class="buy" data-side="BUY" data-type="LIMIT">Buy Limit</button>
    <button class="sell" data-side="SELL" data-type="LIMIT">Sell Limit</button>
    <hr>
    <button class="buy" data-side="BUY" data-type="SL">Buy Stop (SL)</button>
    <button class="sell" data-side="SELL" data-type="SL">Sell Stop (SL)</button>
  </div>

  <script type="module">
    import { createChart, OpenAlgoDataFeed, OpenAlgoWsFeed, OpenAlgoTradeFeed, CandleBuilder, intervalToSeconds } from '/dist/openalgo-charts.mjs';

    const el = (id) => document.getElementById(id);
    const fmt = (n) => Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const nowSec = () => Math.floor(Date.now() / 1000);
    el('apikey').value = localStorage.getItem('oa-apikey') || '';

    // Lookback per interval (seconds) for the history request.
    const LOOKBACK = { '1m': 5 * 86400, '5m': 20 * 86400, '15m': 40 * 86400, '1h': 120 * 86400, 'D': 400 * 86400 };

    let chart, price, volume, ws, rest, ltpLine, offLtp = null, tickN = 0;
    let reconcileTimer = null, liveBucket = null, lastReq = null;
    // chart trading (real OpenAlgo orders via the proxy)
    let trade = null, bookTimer = null, lastLtp = null;
    const orderLines = new Map(); // orderid -> PriceLine
    let posLine = null, ctxPrice = 0;

    function setLegend(sym, ex, intv, bar, ltp) {
      const col = bar && bar.close >= bar.open ? 'up' : 'dn';
      el('legend').innerHTML =
        `<b>${sym}</b> <span style="opacity:.5">· ${intv} · ${ex}</span>` +
        (bar ? ` <span class="${col}">O ${fmt(bar.open)} H ${fmt(bar.high)} L ${fmt(bar.low)} C ${fmt(bar.close)}</span>` : '') +
        (ltp != null ? ` <span class="ltp">LTP ${fmt(ltp)}</span>` : '');
    }

    function disconnect() {
      if (offLtp) { offLtp(); offLtp = null; }
      if (ws) { ws.close(); ws = null; }
      if (reconcileTimer) { clearTimeout(reconcileTimer); reconcileTimer = null; }
      liveBucket = null;
      clearTrading();
      el('wsstate').textContent = 'WS idle';
    }

    // Periodically re-fetch history and snap COMPLETED bars to the broker's official
    // OHLC/volume (live-built bars drift since we only see ticks from connect-time).
    // Mirrors ScalpChart's 20–30s staggered reconcile; never touches the forming bar.
    function scheduleReconcile() {
      reconcileTimer = setTimeout(async () => {
        try {
          const fresh = await rest.getBars({ ...lastReq, to: nowSec() });
          for (const b of fresh) {
            if (liveBucket != null && b.time >= liveBucket) continue; // keep the live bar
            price.update(b);
            volume.update({ time: b.time, open: 0, high: b.volume || 0, low: 0, close: b.volume || 0 });
          }
        } catch (_) { /* transient — next cycle retries */ }
        if (ws) scheduleReconcile();
      }, 20000 + Math.random() * 10000);
    }

    // ── chart trading (real OpenAlgo orders via the proxy) ──────────────────
    const round2v = (n) => Math.round(n * 100) / 100;
    function setMode(m) {
      const e = el('mode');
      if (m === 'analyze') { e.textContent = 'ANALYZE (sandbox)'; e.className = 'pill analyze'; }
      else if (m === 'live') { e.textContent = 'LIVE — real orders'; e.className = 'pill live'; }
      else { e.textContent = 'mode —'; e.className = 'pill'; }
    }
    const isLiveMode = () => el('mode').classList.contains('live');
    function makeOrderLine(o) {
      return chart.addPriceLine({
        price: o.triggerPrice ?? o.price, color: o.side === 'BUY' ? '#26a69a' : '#ef5350',
        lineWidth: 1, dashed: true, id: `order:${o.id}`, cursor: 'ns-resize', extentFromRight: 0.30,
        closeButton: true, leftLabel: `${o.side} ${o.qty} ${o.type}`,
      }, 0);
    }
    async function pollBook() {
      if (!trade) return;
      try {
        const orders = await trade.getOrders(); // also caches ctx so modify works
        const seen = new Set();
        for (const o of orders) {
          if (o.status !== 'working' || o.symbol !== lastReq.symbol) continue;
          seen.add(o.id);
          const px = o.triggerPrice ?? o.price;
          const rec = orderLines.get(o.id);
          if (rec) { rec.order = o; rec.line.setPrice(px); }
          else orderLines.set(o.id, { line: makeOrderLine(o), order: o });
        }
        for (const [id, rec] of orderLines) if (!seen.has(id)) { chart.removePrimitive(rec.line); orderLines.delete(id); }
      } catch (_) { /* transient */ }
      try {
        const res = await fetch('/api/v1/positionbook', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ apikey: el('apikey').value.trim() }) });
        const j = await res.json();
        setMode(j.mode);
        renderPosition((j.data || []).find((p) => p.symbol === lastReq.symbol && Number(p.quantity) !== 0));
      } catch (_) {}
    }
    function renderPosition(pos) {
      if (posLine && chart) { chart.removePrimitive(posLine); posLine = null; }
      if (!pos || !chart) return;
      const net = Number(pos.quantity), avg = Number(pos.average_price), pnl = Number(pos.pnl);
      posLine = chart.addPriceLine({
        price: avg, color: net > 0 ? '#2e7d6b' : '#a14a52', lineWidth: 2, dashed: false, id: 'position', extentFromRight: 0.30,
        leftLabel: `${net > 0 ? 'LONG' : 'SHORT'} ${Math.abs(net)} @ ${fmt(avg)}  ${pnl >= 0 ? '+' : '-'}₹${Math.round(Math.abs(pnl)).toLocaleString('en-IN')}`,
      }, 0);
    }
    async function placeFromMenu(side, type) {
      if (!trade) { el('status').textContent = 'connect first'; return; }
      if (!el('arm').checked) { el('status').textContent = 'arm trading first (toolbar checkbox)'; return; }
      const qty = Math.max(1, Number(el('qty').value) || 1), product = el('product').value;
      const price = type === 'MARKET' ? 0 : round2v(ctxPrice);
      const summary = `${side} ${type} ${qty} ${lastReq.symbol}` + (type === 'MARKET' ? '' : ` @ ${fmt(price)}`) + ` (${product})`;
      if (isLiveMode() && !window.confirm(`LIVE ORDER — real money:\n\n${summary}\n\nPlace this order?`)) return;
      try {
        await trade.place({ symbol: lastReq.symbol, exchange: lastReq.exchange, side, type, qty, product,
          price: type === 'MARKET' ? undefined : price, triggerPrice: type === 'SL' ? price : undefined, mode: isLiveMode() ? 'live' : 'analyzer' });
        el('status').textContent = 'placed: ' + summary;
        pollBook();
      } catch (e) { el('status').textContent = 'order error: ' + e.message; }
    }
    function clearTrading() {
      if (bookTimer) { clearInterval(bookTimer); bookTimer = null; }
      for (const [, rec] of orderLines) if (chart) chart.removePrimitive(rec.line);
      orderLines.clear();
      if (posLine && chart) { chart.removePrimitive(posLine); posLine = null; }
      trade = null;
    }

    async function connect() {
      disconnect();
      const apiKey = el('apikey').value.trim();
      const symbol = el('symbol').value.trim().toUpperCase();
      const exchange = el('exchange').value;
      const interval = el('interval').value;
      if (!apiKey) { el('status').textContent = 'please enter your OpenAlgo API key'; return; }
      localStorage.setItem('oa-apikey', apiKey);

      // ── build the chart ──
      if (chart) chart.destroy();
      el('chart').innerHTML = '';
      chart = createChart(el('chart'), { priceAxisWidth: 72 });
      price = chart.addSeries('candlestick');
      volume = chart.addSeries('histogram', { paneIndex: 1, style: { color: '#33415e' } });

      // ── history (REST via the same-origin proxy → OpenAlgo /api/v1/history) ──
      rest = new OpenAlgoDataFeed({ baseUrl: '', apiKey }); // baseUrl '' → relative → proxy
      const to = nowSec(), from = to - (LOOKBACK[interval] || 30 * 86400);
      lastReq = { symbol, exchange, interval, from };
      el('status').textContent = `loading ${symbol} ${interval} history…`;
      let bars;
      try {
        bars = await rest.getBars({ symbol, exchange, interval, from, to });
      } catch (e) { el('status').textContent = 'history error: ' + e.message; return; }
      if (!bars.length) { el('status').textContent = `no history for ${symbol} ${exchange} ${interval}`; return; }
      price.setData(bars);
      volume.setData(bars.map((b) => ({ time: b.time, open: 0, high: b.volume || 0, low: 0, close: b.volume || 0 })));
      const lastBar = bars[bars.length - 1];
      setLegend(symbol, exchange, interval, lastBar, lastBar.close);
      el('status').textContent = `${symbol} · ${bars.length} bars loaded · subscribing live…`;

      // ── live (WebSocket LTP → CandleBuilder → series.update + live LTP line) ──
      ws = new OpenAlgoWsFeed({ url: el('wsurl').value.trim(), apiKey });
      // Surface the real socket + protocol state so we can see exactly where it stops.
      ws.onState((s) => { el('wsstate').textContent = 'WS ' + s; });
      ws.onControl((m) => {
        if (m.type === 'auth') el('wsstate').textContent = m.status === 'success' ? 'WS authenticated' : `auth ${m.status}`;
        else if (m.type === 'subscribe') el('wsstate').textContent = `subscribe ${m.status}` + (tickN ? '' : ' (waiting for ticks)');
        else if (m.type === 'error') el('wsstate').textContent = 'WS error: ' + (m.message || 'unknown');
      });
      ws.connect();
      ltpLine = chart.addPriceLine({ price: lastBar.close, color: '#e0b020', lineWidth: 1, dashed: true, id: 'ltp' }, 0);
      const liveAgg = /^\d+(m|h)$/i.test(interval); // aggregate ticks into candles for intraday only
      // LTP mode streams reliably across brokers; the forming bar's OHLC builds from
      // ticks. Accurate per-bar VOLUME comes from the reconcile loop (broker history),
      // since LTP carries no size and Quote-mode volume is broker-dependent.
      const builder = new CandleBuilder({ intervalSec: intervalToSeconds(interval), volumeMode: 'ltq-sum' });
      tickN = 0;
      offLtp = ws.onLtp((e) => {
        if (e.symbol && e.symbol !== symbol) return;
        tickN += 1;
        el('wsstate').textContent = 'WS live';
        el('ticks').textContent = `${tickN} ticks`;
        el('ltp').textContent = `LTP ${fmt(e.ltp)}`;
        ltpLine.setPrice(e.ltp);
        if (liveAgg) {
          const u = builder.onTick({ time: e.timeSec || nowSec(), price: e.ltp, ltq: e.ltq });
          if (u) { liveBucket = u.bar.time; price.update(u.bar); setLegend(symbol, exchange, interval, u.bar, e.ltp); }
        } else {
          setLegend(symbol, exchange, interval, lastBar, e.ltp);
        }
      });
      ws.subscribe('LTP', symbol, exchange);
      scheduleReconcile();                     // snap completed bars to broker OHLC + volume every 20-30s

      // chart trading: real OpenAlgo orders (place via right-click; drag to modify; ✕ to cancel)
      trade = new OpenAlgoTradeFeed({ baseUrl: '', apiKey, strategy: 'openalgo-charts', defaultProduct: el('product').value });
      chart.subscribeDrag((id, p) => {
        if (!id.startsWith('order:') || id.endsWith('::close')) return;
        const oid = id.slice('order:'.length), rec = orderLines.get(oid);
        if (!rec) return;
        const px = round2v(p); rec.line.setPrice(px);
        const stop = rec.order.type === 'SL' || rec.order.type === 'SL-M';
        trade.modify(oid, stop ? { triggerPrice: px } : { price: px }).catch(() => {});
      });
      chart.subscribeClick((id) => {
        if (id.startsWith('order:') && id.endsWith('::close')) trade.cancel(id.slice(6, -7)).then(pollBook).catch(() => {});
      });
      bookTimer = setInterval(pollBook, 3000);
      pollBook();
      window.__chart = () => chart;
    }

    el('connect').addEventListener('click', connect);
    el('disconnect').addEventListener('click', () => { disconnect(); el('status').textContent = 'disconnected'; });
    el('fit').addEventListener('click', () => { if (chart) chart.resetScale(); });

    // right-click the chart → order menu at the cursor price (place via OpenAlgoTradeFeed)
    const ctxMenu = el('ctxmenu');
    el('chart').addEventListener('contextmenu', (e) => {
      if (!chart || !trade) return;
      const p = chart.coordinateToPrice(e.clientY - el('chart').getBoundingClientRect().top, 0);
      if (p == null) return;
      e.preventDefault();
      ctxPrice = round2v(p);
      ctxMenu.querySelectorAll('button[data-type]').forEach((b) => {
        const v = b.getAttribute('data-side') === 'BUY' ? 'Buy' : 'Sell', t = b.getAttribute('data-type');
        b.textContent = t === 'MARKET' ? `${v} Market` : t === 'LIMIT' ? `${v} Limit @ ${fmt(ctxPrice)}` : `${v} Stop (SL) @ ${fmt(ctxPrice)}`;
      });
      ctxMenu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
      ctxMenu.style.top = Math.min(e.clientY, window.innerHeight - 220) + 'px';
      ctxMenu.hidden = false;
    });
    window.addEventListener('click', () => { ctxMenu.hidden = true; });
    ctxMenu.addEventListener('click', (e) => {
      const b = e.target.closest('button'); if (!b) return;
      e.stopPropagation(); ctxMenu.hidden = true;
      placeFromMenu(b.getAttribute('data-side'), b.getAttribute('data-type'));
    });
    el('symbol').addEventListener('keydown', (e) => { if (e.key === 'Enter') connect(); });
  </script>
</body>
</html>
